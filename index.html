<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/index.css">
    <title>JS-Email-List</title>
</head>

<body>
    <div class="whole-wrapper d-flex flex-column min-vh-100">
        <header class="d-flex">
            <div class="w-25">
                <img src="./img/booleanLogo.png" alt="Logo di Boolean" class="img-fluid">
            </div>
            <div class="w-75 d-flex align-items-center justify-content-center">
                <h1 class="text-white">Email List Newsletter</h1>
            </div>
        </header>


        <main class="wrapper g-0">
            <div class="row">
                <div class="col-10 offset-1 col-md-8 offset-md-2">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th scope="col"> # </th>
                                <th scope="col"> Username</th>
                                <th scope="col"> Email</th>
                            </tr>
                        </thead>
                        <tbody id="email-list-container">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="mt-auto">
            <div class="text-center d-flex button-wrapper justify-content-center gap-5">
                <button id="create-list-15" class="btn btn-primary">Genera 15 entries nuove</button>
                <button id="create-list-20" class="btn btn-primary">Genera 20 entries nuove</button>
                <button id="create-list-100" class="btn btn-primary">Genera 100 entries nuove</button>
            </div>
        </footer>
    </div>
    <script src="./scripts/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
