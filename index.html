<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/index.css">
    <title>JS-Email-List</title>
</head>

<body>
    <header class="row">
        <div class="col-4">
            <img src="./img/booleanLogo.png" alt="Logo di Boolean" class="img-fluid">
        </div>
        <div class="col-8 d-flex align-items-center justify-content-center">
            <h1 class="text-white">Email List Newsletter</h1>
        </div>
    </header>
    <main class="wrapper container-lg g-0">
        <div class="row">
            <div class="col-10 offset-1 col-md-8 offset-md-2">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th scope="col"> # </th>
                                <th scope="col"> Nome</th>
                                <th scope="col"> Email</th>
                            </tr>
                        </thead>
                        <tbody id="email-list-container">
                            <tr>
                                <td>1</td>
                                <td>testName</td>
                                <td>testEmail@test.com</td>
                            </tr>
                        </tbody>
                    </table>
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="./scripts/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
